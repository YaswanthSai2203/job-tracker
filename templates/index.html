{% extends 'base.html' %}
{% block title %}Welcome{% endblock %}
{% block content %}
<div class="hero-landing">
  <div class="hero-visual" aria-hidden="true"><i class="bi bi-briefcase"></i></div>
  <h1>Job Tracker</h1>
  <p class="lead">Log in or sign up to manage your applications.</p>
  <div class="hero-actions">
    <a href="{{ url_for('auth.login') }}" class="btn btn-primary btn-lg px-4">Log in</a>
    <a href="{{ url_for('auth.signup') }}" class="btn btn-outline-primary btn-lg px-4">Sign up</a>
  </div>
</div>
{% endblock %}
