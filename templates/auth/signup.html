{% extends 'base.html' %}
{% block title %}Sign up{% endblock %}
{% block content %}
<div class="auth-layout">
  <div class="auth-card">
    <h1>Create account</h1>
    <p class="sub">Start tracking applications in minutes</p>
    <form method="POST" novalidate>
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" name="email" id="email" class="form-control" required autocomplete="email" placeholder="you@example.com">
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" name="password" id="password" class="form-control" required autocomplete="new-password" minlength="8">
        <div class="form-text">At least 8 characters, with one letter and one number.</div>
      </div>
      <div class="d-grid">
        <button type="submit" class="btn btn-primary">Create account</button>
      </div>
    </form>
    <p class="text-center small text-app-muted mt-4 mb-0">
      Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a>
    </p>
  </div>
</div>
{% endblock %}
