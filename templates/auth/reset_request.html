{% extends 'base.html' %}
{% block title %}Reset password{% endblock %}
{% block content %}
<div class="auth-layout">
  <div class="auth-card">
    <h1>Reset password</h1>
    <p class="sub">We will show a reset link in the server console (dev mode)</p>
    <form method="POST" novalidate>
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" name="email" id="email" class="form-control" required autocomplete="email" placeholder="you@example.com">
      </div>
      <div class="d-grid gap-2">
        <button type="submit" class="btn btn-primary">Send reset link</button>
        <a href="{{ url_for('auth.login') }}" class="btn btn-outline-secondary">Back to log in</a>
      </div>
    </form>
    {% if reset_link %}
    <div class="alert alert-success mt-4 mb-0 small">
      <strong>Reset link:</strong>
      <a href="{{ reset_link }}" class="d-block mt-1 text-break" target="_blank" rel="noopener">{{ reset_link }}</a>
    </div>
    {% endif %}
  </div>
</div>
{% endblock %}
