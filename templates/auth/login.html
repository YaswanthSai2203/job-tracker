{% extends 'base.html' %}
{% block title %}Log in{% endblock %}
{% block content %}
<div class="auth-layout">
  <div class="auth-card">
    <h1>Welcome back</h1>
    <p class="sub">Log in to your dashboard</p>
    <form method="POST" novalidate>
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" name="email" id="email" class="form-control" required autocomplete="email" placeholder="you@example.com">
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" name="password" id="password" class="form-control" required autocomplete="current-password">
      </div>
      <div class="d-grid gap-2">
        <button type="submit" class="btn btn-primary">Log in</button>
      </div>
    </form>
    <p class="text-center small text-app-muted mt-4 mb-0">
      No account? <a href="{{ url_for('auth.signup') }}">Sign up</a>
      <span class="mx-1">·</span>
      <a href="{{ url_for('auth.reset_request') }}">Forgot password</a>
    </p>
  </div>
</div>
{% endblock %}
