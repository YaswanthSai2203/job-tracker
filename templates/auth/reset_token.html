{% extends 'base.html' %}
{% block title %}New password{% endblock %}
{% block content %}
<div class="auth-layout">
  <div class="auth-card">
    <h1>Set new password</h1>
    <p class="sub">Choose a password you have not used here before</p>
    <form method="POST" novalidate>
      <div class="mb-3">
        <label for="password" class="form-label">New password</label>
        <input type="password" name="password" id="password" class="form-control" required autocomplete="new-password" minlength="6">
      </div>
      <div class="d-grid">
        <button type="submit" class="btn btn-primary">Save password</button>
      </div>
    </form>
    <p class="text-center small text-app-muted mt-4 mb-0">
      <a href="{{ url_for('auth.login') }}">Back to log in</a>
    </p>
  </div>
</div>
{% endblock %}
