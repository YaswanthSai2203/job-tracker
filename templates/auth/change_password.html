{% extends 'base.html' %}
{% block title %}Change password{% endblock %}
{% block content %}
<div class="auth-layout">
  <div class="auth-card">
    <h1>Change password</h1>
    <p class="sub">Use a strong password you do not reuse elsewhere</p>
    <form method="POST" novalidate>
      <div class="mb-3">
        <label for="current_password" class="form-label">Current password</label>
        <input type="password" name="current_password" id="current_password" class="form-control" required autocomplete="current-password">
      </div>
      <div class="mb-3">
        <label for="new_password" class="form-label">New password</label>
        <input type="password" name="new_password" id="new_password" class="form-control" required autocomplete="new-password" minlength="6">
      </div>
      <div class="mb-3">
        <label for="confirm_password" class="form-label">Confirm new password</label>
        <input type="password" name="confirm_password" id="confirm_password" class="form-control" required autocomplete="new-password" minlength="6">
      </div>
      <div class="d-grid gap-2">
        <button type="submit" class="btn btn-primary">Update password</button>
        <a href="{{ url_for('jobs.dashboard') }}" class="btn btn-outline-secondary">Back to dashboard</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
