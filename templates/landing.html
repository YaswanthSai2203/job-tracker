{% extends 'base.html' %}
{% block title %}Welcome · Job Tracker{% endblock %}
{% block content %}
<div class="hero-landing">
  <div class="hero-visual" aria-hidden="true">
    <i class="bi bi-graph-up-arrow"></i>
  </div>
  <h1>Track applications without the spreadsheet chaos</h1>
  <p class="lead">One place for companies, links, resumes, and status—so you always know what you sent and what is next.</p>
  <div class="hero-actions">
    <a href="{{ url_for('auth.signup') }}" class="btn btn-primary btn-lg px-4">Create free account</a>
    <a href="{{ url_for('auth.login') }}" class="btn btn-outline-primary btn-lg px-4">Log in</a>
  </div>
</div>
{% endblock %}
