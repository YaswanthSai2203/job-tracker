{% extends 'base.html' %}
{% block title %}Too many requests{% endblock %}
{% block content %}
<div class="text-center py-5 px-3">
  <p class="text-app-muted text-uppercase small fw-semibold mb-2">429</p>
  <h1 class="mb-3">Slow down a moment</h1>
  <p class="text-app-muted mb-4 mx-auto" style="max-width: 26rem;">Too many requests were sent in a short time. Please wait a minute and try again.</p>
  <a href="javascript:history.back()" class="btn btn-primary">Go back</a>
</div>
{% endblock %}
