{% extends 'base.html' %}
{% block title %}Edit listing{% endblock %}
{% block content %}
<div class="page-head">
  <h1>Edit listing</h1>
  <p>Update the public job board entry.</p>
</div>

<div class="panel">
  <form method="POST" class="row g-3">
    <div class="col-md-6">
      <label class="form-label">Title</label>
      <input type="text" name="title" class="form-control" value="{{ job.title }}" required>
    </div>
    <div class="col-md-6">
      <label class="form-label">Company</label>
      <input type="text" name="company" class="form-control" value="{{ job.company }}" required>
    </div>
    <div class="col-md-6">
      <label class="form-label">Location</label>
      <input type="text" name="location" class="form-control" value="{{ job.location }}" required>
    </div>
    <div class="col-md-6">
      <label class="form-label">Salary <span class="fw-normal text-app-muted">(optional)</span></label>
      <input type="text" name="salary" class="form-control" value="{{ job.salary or '' }}">
    </div>
    <div class="col-12">
      <label class="form-label">Application URL</label>
      <input type="url" name="link" class="form-control" value="{{ job.link }}" required>
    </div>
    <div class="col-12">
      <label class="form-label">Description</label>
      <textarea name="description" class="form-control" rows="5" required>{{ job.description }}</textarea>
    </div>
    <div class="col-12 d-flex flex-wrap gap-2">
      <button type="submit" class="btn btn-primary">Save changes</button>
      <a href="{{ url_for('jobs.admin_jobs') }}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
